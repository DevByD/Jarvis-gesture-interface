<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>J.A.R.V.I.S Interface</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Consolas, monospace;
color:#00ffff;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.35);
}

canvas{
position:absolute;
width:100%;
height:100%;
}

.top-bar{
position:absolute;
top:10px;
left:20px;
font-size:20px;
letter-spacing:6px;
text-shadow:0 0 10px cyan;
}

.clock{
position:absolute;
top:45px;
left:20px;
font-size:36px;
text-shadow:0 0 15px cyan;
}

.energy{
position:absolute;
top:45px;
right:30px;
font-size:28px;
color:#ff5500;
text-shadow:0 0 10px orange;
}

.center-bar{
position:absolute;
top:70px;
left:50%;
transform:translateX(-50%);
border:1px solid cyan;
padding:6px 25px;
font-size:13px;
}

/* LOCATION */

#locationBox{
position:absolute;
top:95px;
left:20px;
font-size:12px;
line-height:16px;
text-shadow:0 0 8px cyan;
}

/* RADAR */

.radar{
position:absolute;
right:40px;
bottom:40px;
width:110px;
height:110px;
border-radius:50%;
border:1px solid cyan;
animation:rotateRadar 6s linear infinite;
}

@keyframes rotateRadar{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* PREVIEW */

#previewBox{
position:absolute;
top:120px;
right:20px;
width:140px;
height:100px;
border:1px solid cyan;
box-shadow:0 0 10px cyan;
object-fit:cover;
}

/* BUTTON */

#captureBtn{
position:absolute;
bottom:20px;
right:20px;
padding:8px 16px;
background:black;
border:1px solid cyan;
color:#00ffff;
cursor:pointer;
}

</style>

</head>

<body>

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<div class="top-bar">
J.A.R.V.I.S SYSTEM
</div>

<div class="clock" id="clock">
00:00:00
</div>

<div id="locationBox">
LOCATING...
</div>

<div class="energy">
3.2 GW
</div>

<div class="center-bar">
BIOMETRIC ENERGY TRACKED
</div>

<div class="radar"></div>

<img id="previewBox"/>

<button id="captureBtn">
CAPTURE FACE
</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script src="script.js"></script>

</body>
</html>
